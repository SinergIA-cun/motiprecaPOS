# Motipreca Web — SPA servida por nginx.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Assets con hash en el nombre -> cache largo e inmutable.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Healthcheck simple del contenedor web.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # SPA: toda ruta desconocida cae en index.html (React Router resuelve).
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
    # Cabeceras de seguridad básicas. La CSP se endurece tras probar el deploy
    # (una CSP estricta mal calibrada rompe la app en el primer arranque).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS: el navegador fuerza HTTPS por 1 año en este dominio. Sin
    # includeSubDomains/preload a propósito: somossinergia.com es compartido
    # con otros proyectos y no queremos forzar HTTPS en subdominios ajenos.
    add_header Strict-Transport-Security "max-age=31536000" always;
  }
}
