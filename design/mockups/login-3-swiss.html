<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motipreca · Dirección 3 — Swiss Utilitario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #1a3a8c;
        --paper: #f4f4f1;
        --ink: #16181d;
        --red: #e2402a;
        --rule: #d8d8d2;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', sans-serif;
        background: var(--paper);
        color: var(--ink);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        -webkit-font-smoothing: antialiased;
      }
      .mono {
        font-family: 'Roboto Mono', monospace;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .frame {
        width: 100%;
        max-width: 1080px;
        background: #fbfbf9;
        border: 1px solid var(--ink);
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.1rem 1.6rem;
        border-bottom: 1px solid var(--ink);
      }
      .top img {
        height: 26px;
      }
      .top .sys {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        font-size: 0.68rem;
        color: #5a5d66;
      }
      .top .dot {
        width: 8px;
        height: 8px;
        background: var(--red);
        border-radius: 50%;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.1fr 1fr;
      }

      .left {
        padding: 3.4rem 2.6rem;
        border-right: 1px solid var(--rule);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 440px;
      }
      .idx {
        font-size: 0.66rem;
        color: var(--red);
      }
      .left h1 {
        font-weight: 700;
        font-size: clamp(2.6rem, 4.5vw, 4rem);
        line-height: 0.98;
        letter-spacing: -0.045em;
        margin-top: 1.2rem;
      }
      .left p {
        max-width: 34ch;
        margin-top: 1.4rem;
        color: #4b4e57;
        font-size: 0.96rem;
        line-height: 1.65;
      }
      .meta {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.4rem 1.5rem;
        font-size: 0.64rem;
        color: #6a6d75;
        border-top: 1px solid var(--rule);
        padding-top: 1.2rem;
      }
      .meta b {
        color: var(--ink);
        font-weight: 500;
      }

      .right {
        padding: 3.4rem 2.6rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .field {
        margin-bottom: 1.5rem;
      }
      .field label {
        display: block;
        font-size: 0.62rem;
        color: #5a5d66;
        margin-bottom: 0.55rem;
      }
      .field input {
        width: 100%;
        height: 48px;
        border: none;
        border-bottom: 1.5px solid var(--ink);
        background: transparent;
        font-family: 'Roboto Mono', monospace;
        font-size: 0.98rem;
        padding: 0 0.1rem;
        transition: border-color 0.18s ease;
      }
      .field input:focus {
        outline: none;
        border-color: var(--red);
      }
      .actions {
        margin-top: 2.4rem;
        display: flex;
        align-items: stretch;
        gap: 0;
        border: 1px solid var(--ink);
      }
      .actions button {
        flex: 1;
        border: none;
        background: var(--navy);
        color: #fff;
        font-family: 'Roboto Mono', monospace;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.78rem;
        height: 52px;
        cursor: pointer;
        transition: background 0.18s ease;
      }
      .actions button:hover {
        background: #122a66;
      }
      .actions .arrow {
        width: 52px;
        display: grid;
        place-items: center;
        background: var(--red);
        color: #fff;
        font-size: 1.1rem;
      }
      .forgot {
        margin-top: 1.3rem;
        font-size: 0.64rem;
        color: #6a6d75;
      }
      .forgot a {
        color: var(--navy);
        text-decoration: none;
        border-bottom: 1px solid var(--navy);
        padding-bottom: 1px;
      }
      @media (max-width: 800px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .left {
          border-right: none;
          border-bottom: 1px solid var(--rule);
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="top">
        <img src="logo.png" alt="Motipreca" />
        <div class="sys mono"><span class="dot"></span> Sistema operativo · v0.1</div>
      </div>

      <div class="grid">
        <div class="left">
          <div>
            <div class="idx mono">01 — Acceso</div>
            <h1>Iniciar<br />sesión.</h1>
            <p>
              Plataforma de cotizaciones y punto de venta. Control de folios, sucursales y clientes
              en un solo lugar.
            </p>
          </div>
          <div class="meta mono">
            <div>Sucursales / <b>03</b></div>
            <div>Región / <b>Sureste MX</b></div>
            <div>Cancún · Playa</div>
            <div>Mérida</div>
          </div>
        </div>

        <div class="right">
          <div class="field">
            <label class="mono">Correo electrónico</label>
            <input type="email" value="admin@test.com" />
          </div>
          <div class="field">
            <label class="mono">Contraseña</label>
            <input type="password" value="test1234" />
          </div>
          <div class="actions">
            <button type="button">Entrar</button>
            <div class="arrow">→</div>
          </div>
          <div class="forgot mono">¿Olvidaste tu contraseña? <a href="#">Recupérala</a></div>
        </div>
      </div>
    </div>
  </body>
</html>
