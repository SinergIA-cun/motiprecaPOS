<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motipreca · Dirección 2 — Bento Operacional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #1a3a8c;
        --navy-d: #122a66;
        --blue: #2c5aa0;
        --amber: #f0a93b;
        --bg: #eef1f6;
        --ink: #1a2336;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', sans-serif;
        color: var(--ink);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
          radial-gradient(1100px 600px at 15% -10%, #dfe7f6 0%, transparent 55%),
          radial-gradient(900px 500px at 110% 110%, #f6ead4 0%, transparent 50%), var(--bg);
        -webkit-font-smoothing: antialiased;
      }
      .bento {
        width: 100%;
        max-width: 940px;
        display: grid;
        grid-template-columns: 1fr 1fr 1.25fr;
        grid-template-rows: 200px 200px;
        gap: 16px;
      }
      .tile {
        border-radius: 22px;
        padding: 1.6rem;
        position: relative;
        overflow: hidden;
      }

      .t-logo {
        background: var(--navy);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 18px 40px -18px rgba(26, 58, 140, 0.6);
      }
      .t-logo img {
        height: 34px;
        filter: brightness(0) invert(1);
      }

      .t-amber {
        background: var(--amber);
        color: #5b3d05;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        box-shadow: 0 18px 40px -20px rgba(240, 169, 59, 0.7);
      }
      .t-amber .big {
        font-family: 'Sora', sans-serif;
        font-weight: 800;
        font-size: 1.5rem;
        line-height: 1.05;
        letter-spacing: -0.02em;
      }
      .t-amber span {
        font-size: 0.78rem;
        font-weight: 600;
        opacity: 0.8;
        margin-bottom: 0.4rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .t-chev {
        background: linear-gradient(135deg, var(--blue), var(--navy-d));
        overflow: hidden;
      }
      .t-chev svg {
        position: absolute;
        right: -20px;
        bottom: -30px;
        width: 180px;
        opacity: 0.35;
      }
      .t-chev .lbl {
        color: #cfe0ff;
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .t-stat {
        background: #fff;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-shadow: 0 12px 30px -18px rgba(20, 35, 54, 0.35);
      }
      .t-stat .num {
        font-family: 'Sora', sans-serif;
        font-weight: 800;
        font-size: 3.2rem;
        line-height: 1;
        letter-spacing: -0.03em;
        color: var(--navy);
      }
      .t-stat .cap {
        color: #67718a;
        font-size: 0.86rem;
        font-weight: 500;
      }
      .t-stat .dots {
        display: flex;
        gap: 6px;
      }
      .t-stat .dots i {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--amber);
      }

      .t-form {
        grid-column: 3;
        grid-row: 1 / span 2;
        background: #fff;
        padding: 2.4rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-shadow: 0 30px 60px -28px rgba(20, 35, 54, 0.4);
      }
      .t-form h1 {
        font-family: 'Sora', sans-serif;
        font-weight: 700;
        font-size: 1.7rem;
        letter-spacing: -0.02em;
        color: var(--navy);
      }
      .t-form .sub {
        color: #67718a;
        font-size: 0.9rem;
        margin: 0.35rem 0 1.8rem;
      }
      label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        color: #45506b;
        margin-bottom: 0.4rem;
      }
      .field {
        margin-bottom: 1.05rem;
      }
      input {
        width: 100%;
        height: 46px;
        border: 1.5px solid #e3e7ef;
        border-radius: 12px;
        padding: 0 0.9rem;
        font-size: 0.95rem;
        font-family: inherit;
        background: #f8f9fc;
        transition: all 0.18s ease;
      }
      input:focus {
        outline: none;
        background: #fff;
        border-color: var(--amber);
        box-shadow: 0 0 0 4px rgba(240, 169, 59, 0.18);
      }
      .forgot {
        text-align: right;
        margin: -0.4rem 0 1.4rem;
      }
      .forgot a {
        color: var(--blue);
        font-size: 0.82rem;
        font-weight: 500;
        text-decoration: none;
      }
      button {
        width: 100%;
        height: 50px;
        border: none;
        border-radius: 12px;
        background: var(--navy);
        color: #fff;
        font-family: 'Sora', sans-serif;
        font-weight: 600;
        font-size: 0.96rem;
        cursor: pointer;
        transition:
          transform 0.12s ease,
          box-shadow 0.2s ease,
          background 0.2s;
        box-shadow: 0 12px 24px -10px rgba(26, 58, 140, 0.6);
      }
      button:hover {
        background: var(--navy-d);
        transform: translateY(-2px);
        box-shadow: 0 18px 30px -12px rgba(26, 58, 140, 0.7);
      }
      button:active {
        transform: translateY(0);
      }
      @media (max-width: 820px) {
        .bento {
          grid-template-columns: 1fr 1fr;
          grid-template-rows: 150px 150px auto;
        }
        .t-form {
          grid-column: 1 / span 2;
          grid-row: 3;
        }
      }
    </style>
  </head>
  <body>
    <div class="bento">
      <div class="tile t-logo"><img src="logo.png" alt="Motipreca" /></div>

      <div class="tile t-amber">
        <span>Tu operación</span>
        <div class="big">Cotiza, vende<br />y crece.</div>
      </div>

      <div class="tile t-form">
        <h1>Bienvenido de vuelta</h1>
        <p class="sub">Accede a tu panel de Motipreca.</p>
        <div class="field">
          <label>Correo electrónico</label>
          <input type="email" value="admin@test.com" />
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" value="test1234" />
        </div>
        <div class="forgot"><a href="#">¿Olvidaste tu contraseña?</a></div>
        <button type="button">Entrar al sistema</button>
      </div>

      <div class="tile t-chev">
        <div class="lbl">Cotizaciones · POS · CRM</div>
        <svg viewBox="0 0 200 200" fill="none" aria-hidden="true">
          <path d="M20 30 L90 100 L20 170" stroke="#fff" stroke-width="20" />
          <path d="M90 30 L160 100 L90 170" stroke="#fff" stroke-width="20" />
        </svg>
      </div>

      <div class="tile t-stat">
        <div class="dots"><i></i><i></i><i></i></div>
        <div>
          <div class="num">03</div>
          <div class="cap">Sucursales conectadas:<br />Cancún · Playa · Mérida</div>
        </div>
      </div>
    </div>
  </body>
</html>
